name: dbt Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'dbt/**'
  schedule:
    # Runs daily at 08:00 UTC — after producer lambda collects data
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Manual trigger for debugging

jobs:
  dbt:
    name: dbt run + test + docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-bigquery
        run: pip install dbt-bigquery

      - name: Write GCP service account key
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp_key.json

      - name: Write dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          steam_tracker:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: service-account
                project: steam-tracker-portfolio
                dataset: steam_marts
                location: EU
                keyfile: /tmp/gcp_key.json
                threads: 4
                timeout_seconds: 300
          EOF

      - name: dbt deps
        working-directory: dbt/steam_tracker
        run: dbt deps

      - name: dbt run
        working-directory: dbt/steam_tracker
        run: dbt run

      - name: dbt test
        working-directory: dbt/steam_tracker
        run: dbt test

      - name: dbt docs generate
        working-directory: dbt/steam_tracker
        run: dbt docs generate

      - name: Upload dbt docs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: dbt/steam_tracker/target/
          retention-days: 7
```


