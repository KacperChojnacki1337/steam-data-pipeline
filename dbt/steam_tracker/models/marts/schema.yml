version: 2

models:
  - name: dim_assets
    description: "Asset dimension — what you own and at what purchase price"
    columns:
      - name: asset_sk
        description: "Surrogate key generated by dbt"
        tests:
          - unique
          - not_null
      - name: asset_id
        tests:
          - not_null
      - name: item_id
        tests:
          - not_null

  - name: fct_portfolio
    description: "Portfolio fact table — current value and unrealized PnL per asset"
    columns:
      - name: asset_sk
        tests:
          - unique
          - not_null
      - name: current_price_usd
        tests:
          - not_null
      - name: usd_pln_rate
        tests:
          - not_null


          